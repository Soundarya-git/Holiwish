<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi Crushey</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #010206;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #main-ui {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .flower-row {
            font-size: clamp(2rem, 8vw, 4rem);
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 12vw, 8rem);
            margin: 0;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: linear-gradient(90deg, #00d2ff, #facc15, #ff00ff, #7a2ff7, #00d2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 3s linear infinite;
        }
        .name-tag {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2rem, 7vw, 4.5rem);
            margin-top: 5px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease 0.5s;
            background: linear-gradient(90deg, #00d2ff, #facc15, #ff00ff, #7a2ff7, #00d2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 3s linear infinite reverse;
        }
        @keyframes flow {
            to { background-position: 200% center; }
        }
        .visible {
            opacity: 1 !important;
            transform: scale(1) translateY(0) !important;
        }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="flower-row" id="top-flowers">🖤</div>
        <h1 id="wish">Happy Holi</h1>
        <p class="name-tag" id="name">Crushey </p>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const wish = document.getElementById('wish');
        const name = document.getElementById('name');
        const flowers = document.getElementById('top-flowers');

        let particles = [];
        const colors = ['#0ea5e9', '#38bdf8', '#facc15', '#e879f9', '#a855f7'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class PowderGrain {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 0.95;
                this.gravity = 0.12;
                this.opacity = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.size = Math.random() * 30 + 15;
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.opacity -= this.decay;
                this.size += 0.5;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                g.addColorStop(0, this.color);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createPop(x, y) {
            const c = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 40; i++) {
                particles.push(new PowderGrain(x, y, c));
            }
        }

        function auto() {
            createPop(Math.random() * canvas.width, Math.random() * canvas.height * 0.8);
            setTimeout(auto, Math.random() * 1000 + 400);
        }

        window.onload = () => {
            wish.classList.add('visible');
            name.classList.add('visible');
            flowers.classList.add('visible');
            auto();
            animate();
        };

        window.addEventListener('mousedown', (e) => createPop(e.clientX, e.clientY));

        function animate() {
            ctx.fillStyle = 'rgba(1, 2, 6, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.opacity <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
